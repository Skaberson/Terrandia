    /* Responsive helpers */
    :root { box-sizing: border-box; }
    *, *::before, *::after { box-sizing: inherit; }
    html, body { font-size: clamp(12px, 1.4vw, 16px); }


    /* Fluid sizes for HUD bars */
    #healthBarContainer, #staminaBarContainer {
      width: clamp(120px, 18vw, 220px);
    }

    /* Mobile phones */
    @media (max-width: 600px) {
      #healthBarContainer, #staminaBarContainer {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        top: 6px;
        width: 86vw;
        height: 16px;
      }
      #hotbarItemsPanel { left: 7%; top: 6vh; width: 86vw; }
      #inventoryPanel { bottom: 6vh; left: 50%; transform: translateX(-50%); padding: 4px; }
      html, body, #game { overflow: auto; }
      #start button {
        width: 90vw !important;
        max-width: 100%;
        height: auto !important;
        padding: 12px;
        font-size: 14px;
        margin: 6px;
      }
      .inventory-slot, .hotbar-slot {
        width: clamp(35px, 7vw, 80px) !important;
        height: clamp(35px, 7vw, 80px) !important;
      }
    }

    /* Very small screens */
    @media (max-width: 400px) {
      #healthBarContainer, #staminaBarContainer {
        width: 80vw;
        height: 14px;
      }
      #healthText, #staminaText {
        font-size: 10px !important;
      }
      .inventory-slot, .hotbar-slot {
        width: clamp(30px, 6vw, 60px) !important;
        height: clamp(30px, 6vw, 60px) !important;
      }
      #start button {
        font-size: 12px;
        padding: 10px;
      }
    }
  </style>

    // Pop-up Modal Function
    function showPopup(message, title = 'Message', buttons = ['OK']) {
      const overlay = document.getElementById('popupOverlay');
      const modal = document.getElementById('popupModal');
      const titleEl = document.getElementById('popupTitle');
      const msgEl = document.getElementById('popupMessage');
      const btnContainer = document.getElementById('popupButtons');
      
      // Set title and message
      titleEl.textContent = title;
      msgEl.textContent = message;
      
      // Clear previous buttons
      btnContainer.innerHTML = '';
      
      // Create buttons
      if (typeof buttons === 'string') {
        buttons = [buttons];
      }
      
      if (Array.isArray(buttons)) {
        buttons.forEach((btn, index) => {
          const button = document.createElement('button');
          button.className = 'popup-btn';
          
          if (typeof btn === 'string') {
            button.textContent = btn;
            button.className += ' confirm';
            button.addEventListener('click', () => {
              overlay.classList.remove('show');
            });
          } else if (typeof btn === 'object') {
            button.textContent = btn.text || 'OK';
            button.className += ' ' + (btn.type || 'confirm');
            button.addEventListener('click', () => {
              if (btn.callback) btn.callback();
              overlay.classList.remove('show');
            });
          }
          
          btnContainer.appendChild(button);
        });
      }
      
      // Show overlay
      overlay.classList.add('show');
    }
    
    
   let BLOCK_SIZE = 87; 
    const BLOCK_SCALE = 1.01;
    const BACKGROUND_BLOCK_SCALE = 2.0;
    const CAMERA_WIDTH = 16;
    const CAMERA_HEIGHT = 9;

    function computeBlockSize() {
      const minBlock = 6; // minimum reasonable block pixel size
      const maxBlock = 350; // guard upper bound
      const byWidth  = Math.floor(window.innerWidth  / CAMERA_WIDTH) || minBlock;
      const byHeight = Math.floor(window.innerHeight / CAMERA_HEIGHT) || minBlock;
      const chosen = Math.max(minBlock, Math.min(byWidth, byHeight));
      BLOCK_SIZE = Math.max(minBlock, Math.min(maxBlock, chosen));
      return BLOCK_SIZE;
    }

    // compute initial BLOCK_SIZE now
    computeBlockSize();

    // keep BLOCK_SIZE updated on resize (recompute then resize canvas)
    window.addEventListener('resize', () => {
      computeBlockSize();
      // if resizeCanvas exists, call it; otherwise it will be called on play/init
      try { if (typeof resizeCanvas === 'function') resizeCanvas(); } catch (e) {}
    });

let maxHealth = 100;
let healthRegenTimer = 0;
const backgroundImages = {};
let acquisitionTimes = {};
let currentWorldName = "default";
// ------------------------------
// World saving/loading (IndexedDB + localStorage fallback)
// ------------------------------
const TERRANDIA_DB_NAME = 'TerrandiaDB';
const TERRANDIA_DB_VERSION = 1;
const TERRANDIA_WORLD_STORE = 'worlds';

function safeStructuredClone(obj) {
  try {
    if (typeof structuredClone === 'function') return structuredClone(obj);
  } catch (e) {}
  // JSON fallback (will drop functions/undefined)
  try { return JSON.parse(JSON.stringify(obj)); } catch (e) { return obj; }
}

function exportGameState() {
  // Keep this conservative: only serialize data we need.
  const invData = (typeof inventory?.toJSON === 'function') ? inventory.toJSON() : safeStructuredClone(inventory);
  return {
    version: 1,
    name: currentWorldName,
    savedAt: Date.now(),
    seed: typeof seed !== 'undefined' ? seed : null,
    world: safeStructuredClone(typeof world !== 'undefined' ? world : {}),
    background: safeStructuredClone(typeof background !== 'undefined' ? background : {}),
    player: {
      x: player?.x ?? 0,
      y: player?.y ?? 0,
      health: typeof playerHealth !== 'undefined' ? playerHealth : 100,
      stamina: typeof playerStamina !== 'undefined' ? playerStamina : 100
    },
    inventory: invData,
    texturePack: typeof currentTexturePackId !== 'undefined' ? currentTexturePackId : 'default'
  };
}

function importGameState(state) {
  if (!state || typeof state !== 'object') throw new Error('Invalid save data');

  // basic fields
  if (typeof state.name === 'string' && state.name.trim()) currentWorldName = state.name.trim();
  if (typeof state.seed !== 'undefined') seed = state.seed;

  // world/background
  world = safeStructuredClone(state.world || {});
  background = safeStructuredClone(state.background || {});

  // player
  if (!player) player = { x: 0, y: 0, w: 1, h: 1 };
  player.x = state.player?.x ?? 0;
  player.y = state.player?.y ?? 0;
  playerHealth = state.player?.health ?? 100;
  playerStamina = state.player?.stamina ?? 100;

  // inventory
  if (state.inventory) {
    if (typeof Inventory === 'function' && (typeof Inventory.fromJSON === 'function')) {
      inventory = Inventory.fromJSON(state.inventory);
    } else if (typeof Inventory === 'function') {
      // Best-effort restore
      inventory = new Inventory();
      try {
        if (typeof inventory.load === 'function') inventory.load(state.inventory);
        else if (typeof inventory.fromJSON === 'function') inventory.fromJSON(state.inventory);
        else Object.assign(inventory, safeStructuredClone(state.inventory));
      } catch (e) {
        // fall back to raw assignment
        inventory = safeStructuredClone(state.inventory);
      }
    } else {
      inventory = safeStructuredClone(state.inventory);
    }
  }

  // texture pack
  if (typeof state.texturePack === 'string') {
    currentTexturePackId = state.texturePack;
    try { applyTexturePack?.(currentTexturePackId); } catch (e) {}
  }

  // refresh HUD
  try { updateHealthBar?.(); } catch (e) {}
  try { updateStaminaBar?.(); } catch (e) {}
}

function openTerrandiaDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      reject(new Error('IndexedDB not supported'));
      return;
    }

    const req = indexedDB.open(TERRANDIA_DB_NAME, TERRANDIA_DB_VERSION);

    req.onupgradeneeded = (event) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(TERRANDIA_WORLD_STORE)) {
        db.createObjectStore(TERRANDIA_WORLD_STORE, { keyPath: 'name' });
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('Failed to open DB'));
  });
}

async function saveWorldToIndexedDB(name) {
  const worldName = (name || currentWorldName || 'default').trim();
  currentWorldName = worldName;
  const payload = { name: worldName, state: exportGameState() };

  // Try IndexedDB first
  try {
    const db = await openTerrandiaDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(TERRANDIA_WORLD_STORE, 'readwrite');
      const store = tx.objectStore(TERRANDIA_WORLD_STORE);
      store.put(payload);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error || new Error('Save transaction failed'));
      tx.onabort = () => reject(tx.error || new Error('Save transaction aborted'));
    });
    try { db.close(); } catch (e) {}
    try { showPopup?.(`Saved world: ${worldName}`, 'World Saved'); } catch (e) {}
    await refreshWorldLists();
    return;
  } catch (e) {
    // Fallback to localStorage
    try {
      localStorage.setItem('terrandia_world_' + worldName, JSON.stringify(payload.state));
      try { showPopup?.(`Saved world (local fallback): ${worldName}`, 'World Saved'); } catch (e2) {}
      await refreshWorldLists();
      return;
    } catch (e2) {
      console.error('Save failed:', e, e2);
      try { showPopup?.('Save failed. Check console for details.', 'Save Error'); } catch (e3) {}
    }
  }
}

async function loadWorldFromIndexedDB(name) {
  const worldName = (name || currentWorldName || '').trim();
  if (!worldName) throw new Error('No world selected');

  // Try IndexedDB
  try {
    const db = await openTerrandiaDB();
    const record = await new Promise((resolve, reject) => {
      const tx = db.transaction(TERRANDIA_WORLD_STORE, 'readonly');
      const store = tx.objectStore(TERRANDIA_WORLD_STORE);
      const req = store.get(worldName);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error || new Error('Load failed'));
    });
    try { db.close(); } catch (e) {}

    if (record?.state) {
      importGameState(record.state);
      try { showPopup?.(`Loaded world: ${worldName}`, 'World Loaded'); } catch (e) {}
      return true;
    }
  } catch (e) {
    // ignore and try local fallback
  }

  // localStorage fallback
  const raw = localStorage.getItem('terrandia_world_' + worldName);
  if (raw) {
    const state = JSON.parse(raw);
    importGameState(state);
    try { showPopup?.(`Loaded world (local fallback): ${worldName}`, 'World Loaded'); } catch (e) {}
    return true;
  }

  throw new Error('World not found: ' + worldName);
}

async function deleteWorldFromIndexedDB(name) {
  const worldName = (name || '').trim();
  if (!worldName) return;

  // IndexedDB delete
  try {
    const db = await openTerrandiaDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(TERRANDIA_WORLD_STORE, 'readwrite');
      const store = tx.objectStore(TERRANDIA_WORLD_STORE);
      store.delete(worldName);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error || new Error('Delete failed'));
      tx.onabort = () => reject(tx.error || new Error('Delete aborted'));
    });
    try { db.close(); } catch (e) {}
  } catch (e) {
    // ignore
  }

  // localStorage fallback delete
  try { localStorage.removeItem('terrandia_world_' + worldName); } catch (e) {}

  try { showPopup?.(`Deleted world: ${worldName}`, 'World Deleted'); } catch (e) {}
  await refreshWorldLists();
}

async function listSavedWorldNames() {
  const names = new Set();

  // IndexedDB
  try {
    const db = await openTerrandiaDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(TERRANDIA_WORLD_STORE, 'readonly');
      const store = tx.objectStore(TERRANDIA_WORLD_STORE);

      // getAllKeys is supported in modern browsers
      const req = store.getAllKeys ? store.getAllKeys() : store.getAll();
      req.onsuccess = () => {
        const res = req.result || [];
        if (store.getAllKeys) {
          res.forEach(k => names.add(String(k)));
        } else {
          res.forEach(r => r?.name && names.add(String(r.name)));
        }
        resolve();
      };
      req.onerror = () => reject(req.error || new Error('List failed'));
    });
    try { db.close(); } catch (e) {}
  } catch (e) {
    // ignore
  }

  // localStorage fallback
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('terrandia_world_')) {
        names.add(key.replace('terrandia_world_', ''));
      }
    }
  } catch (e) {}

  return Array.from(names).sort((a, b) => a.localeCompare(b));
}

function renderWorldList(containerEl, names, onPick) {
  if (!containerEl) return;
  containerEl.innerHTML = '';

  if (!names.length) {
    const empty = document.createElement('div');
    empty.textContent = 'No saved worlds yet.';
    empty.style.cssText = 'opacity:0.8; padding:10px;';
    containerEl.appendChild(empty);
    return;
  }

  names.forEach((name) => {
    const row = document.createElement('div');
    row.textContent = name;
    row.style.cssText = 'padding: 10px; margin: 5px 0; background: #222; border: 1px solid #555; border-radius: 4px; cursor: pointer;';
    row.addEventListener('click', () => {
      // mark selected
      Array.from(containerEl.children).forEach(c => c.classList?.remove('selected'));
      row.classList.add('selected');
      row.style.borderColor = '#FFD700';
      if (typeof onPick === 'function') onPick(name);
    });
    containerEl.appendChild(row);
  });
}

function updateFallingBlocks(left, right, top, bottom) {
  // Process from bottom to top to avoid repeated falling in one frame
  for (let y = bottom; y >= top; y--) {
    for (let x = left; x <= right; x++) {
      const type = getBlock(x, y);
      if (gravityBlocks.has(type)) {
        const belowType = getBlock(x, y + 1);
        if (belowType === 'air') {
          // Move block down
          setBlock(x, y + 1, type);
          setBlock(x, y, 'air');
        }
      }
    }
  }
}

      activeBg = bg;

  button.addEventListener('mouseleave', () => {
    // Do nothing to keep current active background
  });
});

// Helper to get full screen scale used by canvas transforms (DPR * RENDER_SCALE * ZOOM)
function getScreenScale() {
  // using ctx.getTransform().a is the most reliable (it matches what drawing uses)
  try { return ctx.getTransform().a; } catch (e) { 
    const DPR = window.devicePixelRatio || 1;
    return DPR * RENDER_SCALE * ZOOM;
  }
}

document.getElementById('playBtn').addEventListener('click', () => {
    // Show world select screen instead of directly starting
    showWorldSelectScreen();
  });

  function startNewWorldFromMenu(worldName, { closeOverlay = false } = {}) {
    // Set the current world name globally
    currentWorldName = worldName;

    // Clear world data for new world
    world = {};
    background = {};
    seed = Math.floor(Math.random() * 1000000);

    // Reset player to starting position
    player.x = 0;
    player.y = findGroundStartX(player.x);
    playerHealth = maxHealth;

    // Clear inventory
    inventory = new Inventory();

    // Generate initial world chunks
    ensureWorldGenerated(player.x, player.y);

    // Save new world to IndexedDB
    saveWorldToIndexedDB(worldName);
    try { refreshWorldLists(); } catch (e) {}

    // Hide menus and start new game
    document.getElementById('worldSelectScreen').style.display = 'none';
    document.getElementById('start').style.display = 'none';
    if (closeOverlay) {
      const overlay = document.getElementById('popupOverlay');
      if (overlay) overlay.classList.remove('show');
    }
    gameRunning = true;
    resizeCanvas();
    loop();
  }

  function isTitleScreenActive() {
    const startEl = document.getElementById('start');
    const worldSelectEl = document.getElementById('worldSelectScreen');
    if (!startEl || !worldSelectEl) return false;
    return getComputedStyle(startEl).display !== 'none' &&
           getComputedStyle(worldSelectEl).display === 'none';
  }

  document.addEventListener('keydown', (e) => {
    if (!isTitleScreenActive()) return;
    if (!(e.shiftKey && (e.key === 'G' || e.key === 'g'))) return;

    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;

    e.preventDefault();
    const quickWorldName = `World-${Date.now()}`;
    startNewWorldFromMenu(quickWorldName);
  });

  document.getElementById('quitBtn').addEventListener('click', () => {
    // Redirect to another page (e.g. homepage or exit page)
    window.location.href = 'https://newtab'; // Change URL here
  });

  document.getElementById('createNewWorldBtn').addEventListener('click', () => {
    // Create input field for world name
    const inputContainer = document.createElement('div');
    inputContainer.style.cssText = 'margin-bottom: 15px;';
    
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Enter world name...';
    input.style.cssText = `
      width: 100%;
      padding: 10px;
      background: #141416;
      color: #fff;
      border: 2px solid #555;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      box-sizing: border-box;
    `;
    inputContainer.appendChild(input);
    
    const overlay = document.getElementById('popupOverlay');
    const modal = document.getElementById('popupModal');
    const titleEl = document.getElementById('popupTitle');
    const msgEl = document.getElementById('popupMessage');
    const btnContainer = document.getElementById('popupButtons');
    
    // Set title and message
    titleEl.textContent = 'Create New World';
    msgEl.textContent = '';
    msgEl.appendChild(inputContainer);
    
    // Clear previous buttons
    btnContainer.innerHTML = '';
    
    // Create buttons
    const createBtn = document.createElement('button');
    createBtn.className = 'popup-btn confirm';
    createBtn.textContent = 'Create';
    createBtn.addEventListener('click', () => {
      const worldName = input.value.trim();
      if (!worldName) {
        showPopup('Please enter a world name', 'Invalid Input');
        return;
      }
      startNewWorldFromMenu(worldName, { closeOverlay: true });
    });
    
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'popup-btn cancel';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => {
      overlay.classList.remove('show');
    });
    
    btnContainer.appendChild(createBtn);
    btnContainer.appendChild(cancelBtn);
    
    // Show overlay
    overlay.classList.add('show');
    
    // Focus input
    setTimeout(() => input.focus(), 100);
    
    // Allow Enter key to create world
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        createBtn.click();
      }
    });
  });

  document.getElementById('backFromWorldSelectBtn').addEventListener('click', () => {
    // Go back to main menu
    document.getElementById('worldSelectScreen').style.display = 'none';
    try { refreshWorldLists(); } catch (e) {}
  });

// World Manager button wiring
// ------------------------------
(function wireWorldButtons() {
  const createBtn = document.getElementById('createWorldBtn');
  const saveBtn = document.getElementById('saveWorldBtn');
  const loadBtn = document.getElementById('loadWorldBtn');
  const delBtn = document.getElementById('deleteWorldBtn');

  if (createBtn) {
    createBtn.addEventListener('click', () => {
      const name = (document.getElementById('newWorldName')?.value || '').trim();
      if (!name) {
        showPopup?.('Please enter a world name first.', 'Create World');
        return;
      }
      currentWorldName = name;
      // Reset world state
      world = {};
      background = {};
      seed = Math.floor(Math.random() * 1000000);

      // Reset player
      if (!player) player = { x: 0, y: 0, w: 1, h: 1 };
      player.x = 0;
      try { player.y = findGroundStartX(player.x); } catch (e) { player.y = 0; }
      playerHealth = maxHealth;
      playerStamina = maxStamina;

      // Reset inventory
      try { inventory = new Inventory(); } catch (e) { inventory = {}; }

      try { ensureWorldGenerated?.(player.x, player.y); } catch (e) {}
      saveWorldToIndexedDB(name);
    });
  }

  if (saveBtn) {
    saveBtn.addEventListener('click', () => {
      const name = (selectedWorldName || currentWorldName || (document.getElementById('newWorldName')?.value || '')).trim() || 'default';
      saveWorldToIndexedDB(name);
    });
  }

  if (loadBtn) {
    loadBtn.addEventListener('click', async () => {
      const name = (selectedWorldName || '').trim();
      if (!name) {
        showPopup?.('Select a world first.', 'Load World');
        return;
      }
      try {
        await loadWorldFromIndexedDB(name);
        // Ensure chunks exist around player
        try { ensureWorldGenerated?.(player.x, player.y); } catch (e) {}
      } catch (e) {
        console.error(e);
        showPopup?.(String(e.message || e), 'Load Error');
      }
    });
  }

  if (delBtn) {
    delBtn.addEventListener('click', () => {
      const name = (selectedWorldName || '').trim();
      if (!name) {
        showPopup?.('Select a world first.', 'Delete World');
        return;
      }
      showPopup?.(`Delete world "${name}"?`, 'Confirm Delete', [
        { text: 'Cancel', type: 'cancel' },
        { text: 'Delete', type: 'danger', callback: () => deleteWorldFromIndexedDB(name) }
      ]);
    });
  }

  // Keep lists fresh when opening the select screen
  const playBtn = document.getElementById('playBtn');
  if (playBtn) {
    playBtn.addEventListener('click', () => {
      try { refreshWorldLists(); } catch (e) {}
    });
  }
})();

// Update the canvas 2D transform so scale is centered on the canvas center.
function updateTransform() {
  const DPR = window.devicePixelRatio || 1;
  const scale = DPR * RENDER_SCALE * ZOOM;

  // Use pixel size of canvas (not CSS width) for center coordinates.
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // translate so scaling happens about canvas center:
  const tx = cx - scale * cx;
  const ty = cy - scale * cy;

  ctx.setTransform(scale, 0, 0, scale, tx, ty);
  ctx.imageSmoothingEnabled = false;
  ctx.imageSmoothingQuality = "low";
}




// Day / Night cycle config
let timeOfDay = 1;                      //0 seconds into current "day"
let DAY_LENGTH_SECONDS = 100;          // one day = 600s (10 minutes). adjust as desired
let timeScale = 1.0;                   // speed multiplier (set >1 to speed up)
let showTimeHud = true;    // draw the HUD time


// advance time by dt (seconds)
function updateTime(dtSeconds) {
  timeOfDay += dtSeconds * timeScale;
  // wrap
  if (timeOfDay >= DAY_LENGTH_SECONDS) timeOfDay -= Math.floor(timeOfDay / DAY_LENGTH_SECONDS) * DAY_LENGTH_SECONDS;
  if (timeOfDay < 0) timeOfDay += DAY_LENGTH_SECONDS;
}

// returns 0..1 fraction of day (0 = midnight, 0.5 = noon)
function getDayFraction() {
  return (timeOfDay % DAY_LENGTH_SECONDS) / DAY_LENGTH_SECONDS;
}


// ambient light 0..1 (1 at noon, 0 at midnight), smooth
function getAmbientLight() {
  // dayFraction: 0 -> midnight, 0.5 -> noon, 1 -> midnight
  const f = getDayFraction();
  // shift to center at noon then cosine: cos(2π*(f - 0.5)) produces 1 at f=0.5 and -1 at f=0 or 1.
  const raw = Math.cos(2 * Math.PI * (f - 0.5));
  const ambient = Math.max(0, raw); // clamp negative to 0 so nights stay dark (no negative light)
  // optional: raise curve to power for longer dusk/dawn:
  return Math.pow(ambient, 1.0); // change exponent (>1 = shorter high-day)
}

// Return a pretty time string HH:MM (optional)
function formatTimeOfDay() {
  // map timeOfDay onto a 24-hour clock if you like. For simplicity map fraction to 24h.
  const hours = Math.floor(getDayFraction() * 24);
  const minutes = Math.floor(((getDayFraction() * 24) - hours) * 60);
  return String(hours).padStart(2, '0') + ":" + String(minutes).padStart(2, '0');
}

    // --- PRNG and Noise ---
    function mulberry32(a) {
      return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function smoothstep(t) { return t * t * (3 - 2 * t); }
    function valueNoise(x, seed) {
      let rnd = mulberry32(seed + x*73856093);
      return rnd();
    }
    function perlin1d(x, seed) {
      let xi = Math.floor(x);
      let xf = x - xi;
      let l = valueNoise(xi, seed), r = valueNoise(xi+1, seed);
      return lerp(l, r, smoothstep(xf));
    }

class Enemy {
  constructor(x, y, type, textures, walkFrames) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.w = 0.5; // enemy width in world units
    this.h = 1.5; // enemy height in world units
    this.vx = 0;
    this.vy = 0;
    this.onGround = false;
    this.direction = 1;
    this.textures = textures; // { idle: Image, walk: [Image, ...], jump: Image }
    this.walkFrames = walkFrames; 
    this.animationFrame = 0;
    this.lastAnimationTime = 0;
    this.speed = 1.5;
  }

  update(dt) {
    // Basic AI: simple left-right patrol
    
    this.vx = this.speed * this.direction;

    // Gravity
    if (!this.onGround) {
      this.vy += GRAVITY;
      this.vy = Math.min(this.vy, TERMINAL_VELOCITY);
    } else {
      this.vy = 0;
    }

    // Move and collide (reuse collideAABB if applicable)
    const move = collideAABB(this.x, this.y, this.vx * dt, this.vy * dt, this.w, this.h);
    this.x = move.x;
    this.y = move.y;
    this.onGround = move.onGround;

    if (this.onGround) {
      if (move.x === this.x) {
        // If blocked horizontally, turn around
        // (better: add side collision detection)
        this.direction = -this.direction;
      }
    }

    // Update animation frame
    const now = performance.now();
    if (now - this.lastAnimationTime > 150) {
      this.animationFrame = (this.animationFrame + 1) % this.walkFrames.length;
      this.lastAnimationTime = now;
    }
  }

  draw(ctx, camX, camY) {
    const px = (this.x - camX - this.w / 2) * BLOCK_SIZE;
    const py = (this.y - camY) * BLOCK_SIZE;
    const width = this.w * BLOCK_SIZE;
    const height = this.h * BLOCK_SIZE;

    ctx.save();
    if (this.direction === -1) {
      ctx.translate(px + width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(this.walkFrames[this.animationFrame], 0, py, width, height);
    } else {
      ctx.drawImage(this.walkFrames[this.animationFrame], px, py, width, height);
    }
    ctx.restore();
  }
}

class BlockDrop {
  constructor(x, y, blockType) {
    this.x = x; // world coordinates (center)
    this.y = y;
    this.blockType = blockType;
    this.w = 0.6; // size in block units
    this.h = 0.6;
        this.vx = (Math.random() - 0.5) * 4; // random horizontal velocity (left or right, -2 to +2 blocks/sec)
    this.vy = -3 - Math.random() * 2; // random upward velocity (-3 to -5 blocks/sec)
    this.collected = false;
    this.texture = imageCache[blockType]?.img || null;
  }

  update(dt) {
  if (this.collected) return;

  // Distance to player center
  const dx = player.x - this.x;
  const dy = (player.y + player.h / 2) - this.y;
  const distSq = dx * dx + dy * dy;
  const attractionRadius = 3; // blocks
  const attractionRadiusSq = attractionRadius * attractionRadius;

  if (distSq < attractionRadiusSq) {
    const dist = Math.sqrt(distSq) || 0.01;
    // Apply attraction velocity towards player
    const attractionStrength = 5; // adjust for speed
    this.vx += (dx / dist) * attractionStrength * dt;
    this.vy += (dy / dist) * attractionStrength * dt;
  }

  // Apply gravity
  this.vy += GRAVITY - 20 * dt;
  if (this.vy > TERMINAL_VELOCITY) this.vy = TERMINAL_VELOCITY;

  // Horizontal movement and collision
  let newX = this.x + this.vx * dt;
  if (!isSolid(Math.floor(newX - this.w / 2), Math.floor(this.y)) &&
      !isSolid(Math.floor(newX + this.w / 2), Math.floor(this.y))) {
    this.x = newX;
  } else {
    this.vx = 0; // stop horizontal movement on collision
  }

  // Vertical movement and collision
  let newY = this.y + this.vy * dt;
  // Check collision below for feet corners
  if (this.vy > 0) {
    if (!isSolid(Math.floor(this.x - this.w / 2), Math.floor(newY + this.h / 2)) &&
        !isSolid(Math.floor(this.x + this.w / 2), Math.floor(newY + this.h / 2))) {
      this.y = newY;
    } else {
      // Collided with ground
      this.y = Math.floor(newY + this.h / 2) - this.h / 2;
      this.vy = 0;
      this.vx *= 0.8;  // some friction
    }
  } else {
    // Moving up (jump bounce)
    if (!isSolid(Math.floor(this.x - this.w / 2), Math.floor(newY - this.h / 2)) &&
        !isSolid(Math.floor(this.x + this.w / 2), Math.floor(newY - this.h / 2))) {
      this.y = newY;
    } else {
      this.vy = 0;
    }
  }

  // Player pickup collision (keep as is)
  if (
    player.x + player.w / 2 > this.x - this.w / 2 &&
    player.x - player.w / 2 < this.x + this.w / 2 &&
    player.y + player.h > this.y - this.h / 2 &&
    player.y < this.y + this.h / 2
  ) {
    this.collect();
  }
}


  collect() {
    if (this.collected) return;
    this.collected = true;
    // Add block to inventory
    inventory.addItem(this.blockType, 1);
    updateHotbar();
    updateInventoryDisplay();

    // Optionally play pickup sound or effect here
  }

  draw(ctx, camX, camY) {
  if (this.collected || !this.texture) return;

  const px = (this.x - camX - this.w / 2) * BLOCK_SIZE;
  const py = (this.y - camY - this.h / 2) * BLOCK_SIZE;
  const sizeX = this.w * BLOCK_SIZE;
  const sizeY = this.h * BLOCK_SIZE;

  ctx.save();

  // Set glow and outline styles
  ctx.shadowColor = 'rgba(0, 0, 0, 1)';   // black outline
  ctx.shadowBlur = 6;                     // size of the glow
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Draw the texture with shadow (glow + outline)
  ctx.drawImage(this.texture, px, py, sizeX, sizeY);

  ctx.restore();
}

 *
 * Parameters tuned for your code:
 * - particle.size is in pixels; convert to world units using BLOCK_SIZE.
 * - particles[].x/y are world coordinates.
 */
function resolveParticleCollisions(particles, dt) {
  if (!particles || particles.length < 2) return;

  // grid cell size in world units - choose ~= average particle radius*2 or 1.0
  const cellSize = 0.8; // world units - tweak for perf/accuracy
  const grid = new Map();

  const key = (ix, iy) => (ix << 16) ^ iy; // cheap combined key (works for ranges used)

  // Insert particles into grid (store indices)
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    // compute which cell the particle center is in
    const ix = Math.floor(p.x / cellSize);
    const iy = Math.floor(p.y / cellSize);
    const k = key(ix, iy);
    let arr = grid.get(k);
    if (!arr) { arr = []; grid.set(k, arr); }
    arr.push(i);
    // store cell for optional debugging
    p._gridIx = ix; p._gridIy = iy;
  }

  // For each particle, check neighbors in 3x3 neighborhood
  for (let i = 0; i < particles.length; i++) {
    const A = particles[i];
    const baseIx = Math.floor(A.x / cellSize);
    const baseIy = Math.floor(A.y / cellSize);

    // compute collision radius in world units for A
    const rA = (A.size || 8) / BLOCK_SIZE * 0.5; // if size missing, fallback
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const neighborKey = key(baseIx + dx, baseIy + dy);
        const list = grid.get(neighborKey);
        if (!list) continue;
        for (const j of list) {
          if (j <= i) continue; // avoid double-check and self
          const B = particles[j];

          // radius of B in world units
          const rB = (B.size || 8) / BLOCK_SIZE * 0.5;
          const minDist = rA + rB;

          // separation vector
          let sx = B.x - A.x;
          let sy = B.y - A.y;
          let dist = Math.hypot(sx, sy) || 1e-6;

          if (dist < minDist) {
            // overlap amount
            const overlap = (minDist - dist);

            // normalized collision normal
            const nx = sx / dist;
            const ny = sy / dist;

            // positional correction: move each particle half the overlap (equal mass)
            const correction = 0.5 * overlap + 1e-4; // small epsilon to avoid sticking
            A.x -= nx * correction;
            A.y -= ny * correction;
            B.x += nx * correction;
            B.y += ny * correction;

            // relative velocity along normal
            const relVx = B.speedX - A.speedX;
            const relVy = B.speedY - A.speedY;
            const vn = relVx * nx + relVy * ny;

            // only apply impulse if they are approaching
            if (vn < 0) {
              const restitution = 0.18; // bounciness: 0..1 (lower = more damped)
              // equal mass -> impulse scalar simplified
              const impulse = (-(1 + restitution) * vn) * 0.5;

              A.speedX -= impulse * nx;
              A.speedY -= impulse * ny;
              B.speedX += impulse * nx;
              B.speedY += impulse * ny;

              // small damping to remove energy and avoid jitter
              const damp = 0.98;
              A.speedX *= damp;
              A.speedY *= damp;
              B.speedX *= damp;
              B.speedY *= damp;
            }
          }
        }
      }
    }
  }
}

class CrumbleParticle {
      constructor(worldX, worldY, texture, segmentX, segmentY) {
        this.x = worldX;
        this.y = worldY;
        this.texture = texture;
        this.segmentX = segmentX; // 0-2 (horizontal segment)
        this.segmentY = segmentY; // 0-2 (vertical segment)
        this.size = 0.33; // 1/3 of a block
        this.speedX = (Math.random() - 0.5) * 1; // Wider spread
        this.speedY = -(2 + Math.random() * 1); // Upward burst
        this.life = 2.0;
        this.decay = 0.5;
        this.createdAt = performance.now();
        this.lifetime = 4000;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.2;
      }

      update(dt) {
        let newX = this.x + this.speedX * dt;
        let newY = this.y + this.speedY * dt;

        // Horizontal collision
        if (isSolid(Math.floor(newX), Math.floor(this.y))) {
          this.speedX = -this.speedX * 0.3;
          newX = this.x;
        }

        // Vertical collision
        if (isSolid(Math.floor(this.x), Math.floor(newY))) {
          this.speedY = -this.speedY * 0.5;
          newY = this.y;
        } else {
          this.speedY += GRAVITY * dt * 15;
        }

        this.x = newX;
        this.y = newY;
        this.life -= this.decay * dt;
        this.rotation += this.rotationSpeed * dt;
      }

      draw(ctx, camX, camY) {
        ctx.save();
        ctx.globalAlpha = this.life;

        const screenX = (this.x - camX) * BLOCK_SIZE;
        const screenY = (this.y - camY) * BLOCK_SIZE;
        const size = this.size * BLOCK_SIZE;

        if (this.texture && this.texture.complete && this.texture.naturalWidth > 0) {
          const tex = this.texture;
          // Divide texture into 3x3 grid
          const segWidth = tex.naturalWidth / 3;
          const segHeight = tex.naturalHeight / 3;
          
          const srcX = this.segmentX * segWidth;
          const srcY = this.segmentY * segHeight;

          ctx.translate(screenX, screenY);
          ctx.rotate(this.rotation);
          ctx.drawImage(tex, srcX, srcY, segWidth, segHeight, -size / 2, -size / 2, size, size);
        } else {
          // Fallback colored rectangle
          ctx.fillStyle = '#888';
          ctx.translate(screenX, screenY);
          ctx.rotate(this.rotation);
          ctx.fillRect(-size / 2, -size / 2, size, size);
        }

        ctx.restore();
      }

      isDead() {
        return this.life <= 0 || performance.now() - this.createdAt > this.lifetime;
      }
    }


    class Particle {
  constructor(worldX, worldY, color, texture = null) {
    this.x = worldX;
    this.y = worldY;
    this.color = color;
    this.texture = texture;
    this.size = 15 + Math.random() * 5;
    this.speedX = (Math.random() - 0.5) * 0.7;

    // Start with a controlled upward speed (e.g., -1 to -3)
    this.speedY = - (1 + Math.random() * 2);

    this.life = 0.5;
    this.decay = 0.25;
    this.createdAt = performance.now();
    this.lifetime = 1800;
  }

  update(dt) {
  // Update tentative position
  let newX = this.x + this.speedX * dt;
  let newY = this.y + this.speedY * dt;
  resolveParticleCollisions(particles, dt);

  // Check for collision with solid blocks (floor, walls)
  // Assuming particle size is small, check tile(s) under new position

  // Horizontal collision
  if (isSolid(Math.floor(newX), Math.floor(this.y))) {
    this.speedX = -this.speedX * 0.3; // Bounce or stop with friction
    newX = this.x; // Cancel horizontal movement
  }

  // Vertical collision
  if (isSolid(Math.floor(this.x), Math.floor(newY))) {
    this.speedY = -this.speedY * 0.5; // Bounce with damping
    newY = this.y; // Cancel vertical movement
  } else {
    this.speedY += GRAVITY * dt * 15; // Apply gravity if no collision below
  }

  // Update position
  this.x = newX;
  this.y = newY;

  this.life -= this.decay * dt;
}


  draw(ctx, camX, camY) {
  ctx.save();
  ctx.globalAlpha = this.life;

  const screenX = (this.x - camX) * BLOCK_SIZE;
  const screenY = (this.y - camY) * BLOCK_SIZE;

  if (this.texture && this.texture.complete && this.texture.naturalWidth > 0) {
    const tex = this.texture;
    const size = this.size;

    // Crop 20% from each edge -> draw center 60%
    const cropX = tex.naturalWidth * 0.4;       // 20% crop border on left
    const cropY = tex.naturalHeight * 0.4;      // 20% crop border on top
    const cropW = tex.naturalWidth * 0.6;       // 60% width from center
    const cropH = tex.naturalHeight * 0.6;      // 60% height from center

    // Draw cropped portion centered at particle position with size
    ctx.drawImage(tex,
      cropX, cropY, cropW, cropH,       // Source rect (cropped)
      screenX - size/2, screenY - size/2, size, size  // Destination
    );
  } else {
    // fallback: draw colored circle
    ctx.fillStyle = this.color || '#fff';
    ctx.beginPath();
    ctx.arc(screenX, screenY, this.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}


  isDead() {
    return this.life <= 0 || performance.now() - this.createdAt > this.lifetime;
  }
}







// Returns true if the player's bounding box overlaps the tile at (tx,ty)
function isPlayerOccupyingTile(tx, ty) {
  // Player: x = center X, y = top Y
  const pLeft   = player.x - player.w / 2;
  const pRight  = player.x + player.w / 2;
  const pTop    = player.y;
  const pBottom = player.y + player.h;

  // Tile bounds (each tile is 1x1 world unit)
  const tLeft   = tx;
  const tRight  = tx + 1;
  const tTop    = ty;
  const tBottom = ty + 1;

  // AABB overlap test
  return !(pRight <= tLeft || pLeft >= tRight || pBottom <= tTop || pTop >= tBottom);
}

function handleCommand(input) {
  input = input.trim();
  const parts = input.split(/\s+/);
  const command = parts[0].toLowerCase();

  if (command === 'showlayers') {
    toggleLayersOverlay();
    return;
  }
  
  if (command === 'time') {
    progresstime();
    return;
  }
  
  if (command === 'block') {
    block();
    return;
  }
  
  
  if (command === 'd') {
    d();
    return;
  }
  
  if (command === 'dynamine') {
    dynamine();
    return;
  }
  

  if (command === 'texturepack') {
    if (parts.length < 2) {
      showAdminMessage('Usage: texturepack <packId>');
      return;
    }
    const packId = parts[1];
    if (TEXTURE_PACKS[packId]) {
      applyTexturePack(packId);
      showAdminMessage(`Texture pack switched to "${packId}"`);
    } else {
      showAdminMessage(`Texture pack "${packId}" not found`);
    }
    return;
  }

  if (command === 'give') {
  if (parts.length < 2) {
    showAdminMessage('Usage: give <blockId> [amount]');
    return;
  }
  const blockId = parts[1];
  let amount = 1;
  if (parts.length >= 3) {
    amount = parseInt(parts[2], 10);
    if (isNaN(amount) || amount < 1) amount = 1;
  }

  // Option 1: Allow any block ID without validation:
  // Just add it directly:
  const added = inventory.addItem(blockId, amount);
  if (added) {
    showAdminMessage(`Gave ${amount} x ${blockId}`);
    updateHotbar();
    updateInventoryDisplay();
  } else {
    showAdminMessage('Inventory full, cannot give items');
  }
  return;
}

  input = input.trim();
  const assignmentMatch = input.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
  if (assignmentMatch) {
    const varName = assignmentMatch[1];
    let value = assignmentMatch[2];

    // List of allowed variables to set:
    if (!admin.authenticated) {
  const allowedVariables = ['MOVE_SPEED', 'GRAVITY', 'player.w', 'player.h', 'maxHealth', 'playerHealth'];
  if (!allowedVariables.includes(varName)) {
    showAdminMessage(`Setting variable \"${varName}\" is not allowed`);
    return;
  }
}


    // Convert value to proper type: number, boolean or string
    if (!isNaN(value)) {
      value = Number(value);
    } else if (value.toLowerCase() === 'true') {
      value = true;
    } else if (value.toLowerCase() === 'false') {
      value = false;
    }

    // Apply the value safely:
    try {
      if (varName.includes('.')) {
        // For nested properties like 'player.w'
        const parts = varName.split('.');
        let obj = window;
        for (let i = 0; i < parts.length -1; i++) {
          obj = obj[parts[i]];
          if (obj === undefined) throw new Error("Invalid path");
        }
        obj[parts[parts.length - 1]] = value;
      } else {
        window[varName] = value;
      }

      showAdminMessage(`Set ${varName} = ${value}`);
      if (varName === 'player.w' || varName === 'player.h') updatePlayerWidth(); // Update UI if needed
      if (varName === 'MOVE_SPEED') runningSpeedSlider.value = MOVE_SPEED; // Sync slider
      if (varName === 'GRAVITY') gravityslider.value = GRAVITY; // Sync slider
      if (varName === 'playerHealth') updateHealthBar();

    } catch (e) {
      showAdminMessage('Failed to set variable: ' + e.message);
    }
  } else if (input.startsWith('teleport') || input.startsWith('tp') || input.startsWith('t')) {
      // existing teleport command logic (KEEP existing)
      const args = input.split(/\s+/);
      if (args.length >= 3) {
        const x = parseFloat(args[1]);
        const y = parseFloat(args[2]);
        if(!isNaN(x) && !isNaN(y)) {
          player.x = x;
          player.y = y;
          camera.x = x;
          camera.y = y;
          showAdminMessage(`Teleported to (${x}, ${y})`);
        } else {
          showAdminMessage('Invalid coordinates');
        }
      } else {
        showAdminMessage('Usage: teleport x y');
      }
  } else {
    showAdminMessage(`Unknown command: ${input}`);
  }
}


document.addEventListener('keydown', (e) => {
  // If command line is open, ignore menu toggling keys
  if (commandLine.style.display === 'none') {
    // Only allow Esc to close command line
    if (e.key === 'Escape') {
      commandLine.style.display = 'none';
    }
    return; 
  }

  switch(e.key.toLowerCase()) {
    case 'e': // inventory toggle example
      inventoryOpen = !inventoryOpen;
      if (inventoryOpen) {
        showInventory();
        showCrafting();
      } else {
        hideInventory();
        hideCrafting();
      }
      break;
    case 't':  // texture menu toggle
      toggleTextureMenu();
      break;
    case 'p':  // admin panel toggle
      toggleAdminPanel();
      break;
    // add other menu keys similarly
  }
});


let chatUsername = localStorage.getItem('terr_chat_username') || null;

function promptUsername() {
  let name = prompt("Enter your chat username:", "");
  if (name && name.trim().length > 0) {
    chatUsername = name.trim();
    localStorage.setItem('terr_chat_username', chatUsername);
    return true;
  }
  return false;
}

// Show chat message in chatMessages div
function showChatMessage(msg, user = null) {
  const chatContainer = document.getElementById('chatMessages');
  if (!chatContainer) return;

  const message = document.createElement('div');
  message.style.marginBottom = '4px';
  message.style.wordBreak = 'break-word';
  message.style.opacity = '1';
  message.style.transition = 'opacity 1s ease';

  if (user) {
    message.innerHTML = `<strong style="color:#FFD700;">${user}:</strong> ${escapeHtml(msg)}`;
  } else {
    message.textContent = msg;
  }

  chatContainer.appendChild(message);

  // Scroll chat to bottom
  chatContainer.scrollTop = chatContainer.scrollHeight;

  // Fade out after 4 seconds and remove
  setTimeout(() => {
    message.style.opacity = '0';
    setTimeout(() => {
      message.remove();
    }, 1000); // must match CSS transition duration
  }, 4000);
}


// Simple HTML escape to avoid injection
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}



function showAdminMessage(msg) {
  const chatContainer = document.getElementById('chatMessages');
  if (!chatContainer) return;

  const message = document.createElement('div');
  message.textContent = msg;
  message.style.opacity = '1';
  message.style.marginBottom = '4px';
  message.style.transition = 'opacity 0.5s ease';

  chatContainer.appendChild(message);

  // Scroll chat to bottom
  chatContainer.scrollTop = chatContainer.scrollHeight;

  // Fade out after 4 seconds and remove
  setTimeout(() => {
    message.style.opacity = '0';
    setTimeout(() => {
      message.remove();
    }, 500);
  }, 4000);
}

// Helper: returns true if `type` is a stone-like block for the given x (or a biome object)
function isStoneLike(type, xOrBiome) {
  if (!type) return false;

  // If caller passed an x coord, resolve the biome there
  let biome = null;
  if (typeof xOrBiome === 'number') {
    biome = getBiome(xOrBiome);
  } else if (xOrBiome && typeof xOrBiome === 'object') {
    biome = xOrBiome;
  }

  // basic known stone names
  if (type === 'stone' || type === 'hotstone' || type === 'magma' || type === 'abyssalrock') return true;

  // biome-based stones (if we resolved a biome)
  if (biome) {
    if (type === biome.stone) return true;
    if (biome.deepstone && type === biome.deepstone) return true;
  }

  // heuristic: names that end with 'rock' or 'stone' are probably replacable
  if (typeof type === 'string') {
    if (type.endsWith('rock') || type.endsWith('stone')  || type.endsWith('comb')) return true;
  }

  return false;
}

function getJumpVelAtY(y) {
  const maxJump = 7;    // Base jump velocity near surface (y=0)
  const minJump = 15;   // Higher jump velocity when higher up (e.g., y = -1000)
  const startY = 0;
  const endY = -1000;

  if (y >= startY) return maxJump;
  if (y <= endY) return minJump;

  const t = (startY - y) / (startY - endY);
  const smoothT = t * t * (3 - 2 * t); // easing

  return maxJump + (minJump - maxJump) * smoothT;
}

function getGravityAtY(y) {
  const maxGravity = 0.4;   // gravity near surface (y=0)
  const minGravity = 0.05;  // gravity deep underground (y=-3370)
  const startY = 0;
  const endY = -1000;

  if (y >= startY) return maxGravity;
  if (y <= endY) return minGravity;

  // Calculate interpolation parameter between 0 (at surface) and 1 (at deep underground)
  const t = (startY - y) / (startY - endY);

  // Smooth interpolation using ease-in-out cubic: t*t*(3-2*t)
  const smoothT = t * t * (3 - 2 * t);

  // Interpolate gravity from maxGravity to minGravity
  return maxGravity + (minGravity - maxGravity) * smoothT;
}

const HEIGHT_COLOR_RANGES = [
  // high sky (very negative Y)
  { minY: 279, maxY: 360, colorTop: "#071028", colorBottom: "#0b2240", blend: 1.0 },
  // upper atmosphere / horizon
  { minY: -400, maxY: -100, colorTop: "#0b2240", colorBottom: "#223366", blend: 0.9 }

];

// return a CSS color for world Y by finding matching range and lerping its endpoints
function getHeightRangeColor(y) {
  for (let r of HEIGHT_COLOR_RANGES) {
    if (y >= r.minY && y < r.maxY) {
      // normalized position inside this range (0..1)
      const span = (r.maxY === Infinity || r.minY === -Infinity) ? 1 : (r.maxY - r.minY);
      const t = (span === 0) ? 0 : Math.max(0, Math.min(1, (y - r.minY) / span));
      // smooth interpolation for nicer gradient
      const s = smoothstep01(t);
      return lerpColorHex(r.colorTop, r.colorBottom, s);
    }
  }
  return null;
}

// get the blend weight for a given Y (how strongly height color overrides biome color)
function getHeightBlendForY(y) {
  for (let r of HEIGHT_COLOR_RANGES) {
    if (y >= r.minY && y < r.maxY) {
      return r.blend ?? 1.0;
    }
  }
  return 1.0;
}


function dropBlockItems(x, y, blockType) {
  const loot = TILE_LOOT_TABLES[blockType];

  if (!loot) {
    // Default: drop 1 of the block itself
    spawnDrop(x, y, blockType, 1);
    return;
  }

  if (Array.isArray(loot)) {
    // Existing: drop all items in loot list (min..max amount)
    for (const drop of loot) {
      const count = Math.floor(Math.random() * (drop.max - drop.min + 1)) + drop.min;
      if (count > 0) {
        spawnDrop(x, y, drop.itemType, count);
      }
    }
  } else if (loot.pool && Array.isArray(loot.pool)) {
    // New: pick exactly one random drop from the pool
    const pool = loot.pool;
    // pick random index
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const count = Math.floor(Math.random() * (pick.max - pick.min + 1)) + pick.min;
    if (count > 0) {
      spawnDrop(x, y, pick.itemType, count);
    }
  } else {
    // If not array or pool, fallback drop block itself once
    spawnDrop(x, y, blockType, 1);
  }
}

// --- Ore spawn configuration (tweak values to taste) ---
const ORE_SPAWN = {
  copper_ore:    { minY: 6,    maxY: 80,  baseChance: 0.1, veinSize: [3,8],  noiseSeed: 3234},
  tin_ore:       { minY: 30,   maxY: 120, baseChance: 0.1, veinSize: [3,7],  noiseSeed: 5467 },
  silver_ore:    { minY: 80,   maxY: 200, baseChance: 0.1, veinSize: [4,10], noiseSeed: 9876 },
  gold_ore:      { minY: 70,  maxY: 200, baseChance: 0.1, veinSize: [4,12], noiseSeed: 1357 },
  platinum_ore:  { minY: 70,  maxY: 200, baseChance: 0.1,veinSize: [5,14], noiseSeed: 2468 },
  tungsten_ore:  { minY: 50,  maxY: 200, baseChance: 0.1,veinSize: [6,16], noiseSeed: 3690 },
  bronzium:      { minY: 60,   maxY: 100,baseChance: 0.1,veinSize: [6,12],  noiseSeed: 7777 },
  adamantine:      { minY: 385,   maxY: 450,baseChance: 0.1,veinSize: [15,40],  noiseSeed: 9999 },
  mythril:      { minY: 291,   maxY: 340,baseChance: 0.1,veinSize: [15,40],  noiseSeed: 8594 },
  astorzum:      { minY: -1000,   maxY: -700,baseChance: 0.1,veinSize: [15,40],  noiseSeed: 8594 }
  
};

// clamp helper
function clamp01(v){ return Math.max(0, Math.min(1, v)); }

// smoothstep for gentle tapering
function smoothstep01(t){ return t<=0?0: t>=1?1: t*t*(3-2*t); }

// returns 0..1 weight for given ore at world y (1 inside center, 0 outside)
function oreDepthWeight(oreCfg, y){
  if (!oreCfg) return 0;
  // if outside hard bounds return 0
  if (y < oreCfg.minY || y > oreCfg.maxY) return 0;
  const span = Math.max(1, oreCfg.maxY - oreCfg.minY);
  // normalized inside [0..1] where 0 is minY and 1 is maxY
  const t = (y - oreCfg.minY) / span;
  // center the best spawn in the middle and taper near edges with smoothstep
  const centered = 1 - Math.abs(t - 0.5) * 2; // 1 at center, 0 at edges
  return smoothstep01(centered);
}

// probability test using noise + baseChance*depthWeight
function oreRoll(x, y, oreCfg) {
  if (!oreCfg) return false;
  const depthW = oreDepthWeight(oreCfg, y);
  if (depthW <= 0) return false;
  // use valueNoise to create spatial variation; noise in 0..1
  const n = valueNoise(x*3 + y*7, (oreCfg.noiseSeed || 12345));
  // effective chance scaled by depth weight
  const chance = oreCfg.baseChance * (0.5 + 0.5 * depthW); // scale to [0.5..1]*base
  // apply noise threshold so ores cluster
  return n < chance;
}

function generateOreVeins(cx, cy) {
  const candidateOres = Object.keys(ORE_SPAWN);
  for (let vein = 0; vein < 3; vein++) {
    const veinX = cx * CHUNK_SIZE + Math.floor(Math.random() * CHUNK_SIZE);
    const veinY = cy * CHUNK_SIZE + Math.floor(Math.random() * CHUNK_SIZE);

    // pick candidate ores allowed at this Y (depth weight > small threshold)
    const allowed = candidateOres.map(n => {
      const w = oreDepthWeight(ORE_SPAWN[n], veinY);
      return { name: n, weight: w };
    }).filter(o => o.weight > 0.02);

    if (allowed.length === 0) continue;

    // weighted pick
    const total = allowed.reduce((s,o)=>s+o.weight, 0);
    let r = Math.random() * total;
    let selected = allowed[0].name;
    for (const a of allowed) {
      r -= a.weight;
      if (r <= 0) { selected = a.name; break; }
    }

    const cfg = ORE_SPAWN[selected];
    if (!cfg) continue;

    const veinSize = cfg.veinSize ? (cfg.veinSize[0] + Math.floor(Math.random() * (cfg.veinSize[1] - cfg.veinSize[0] + 1))) : (3 + Math.floor(Math.random()*8));

    // flood-fill / random-walk vein creation
    const visited = new Set();
    const queue = [[veinX, veinY]];
    visited.add(`${veinX},${veinY}`);

    // place initial block if stone-like for that location (use isStoneLike)
    const initialBlock = getBlock(veinX, veinY);
    const biomeAtInitial = getBiome(veinX);
    if (initialBlock !== null && isStoneLike(initialBlock, biomeAtInitial)) {
      setBlock(veinX, veinY, selected);
    }

    let placed = 1;
    while (queue.length > 0 && placed < veinSize) {
      const [x,y] = queue.shift();
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dx,dy] of dirs) {
        if (placed >= veinSize) break;
        const nx = x + dx, ny = y + dy;
        const key = `${nx},${ny}`;
        if (visited.has(key)) continue;
        visited.add(key);

        // only place if generated and stone-like for that biome
        const nb = getBlock(nx, ny);
        if (nb === null) continue; // skip ungenerated
        const biomeAtN = getBiome(nx);
        if (!isStoneLike(nb, biomeAtN)) continue;

        // additional probability: depth weight and noise
        const depthW = oreDepthWeight(cfg, ny);
        const noiseVal = valueNoise(nx*2 + ny*5, cfg.noiseSeed || 9999);
        if (noiseVal < 0.65 * depthW + 0.15) { // combine noise and depth preference
          setBlock(nx, ny, selected);
          placed++;
          queue.push([nx, ny]);
        }
      }
    }
  }
}

// Save world data to localStorage
function saveWorld() {
  try {
    const worldData = {
      seed: seed,
      world: world,
      player: {
        x: player.x,
        y: player.y,
        w: player.w,
        h: player.h,
        health: playerHealth
      },
      inventory: inventory.getAllItems(),
      hotbarSelected: hotbarSelected,
      currentWorldName: currentWorldName
    };
    
    localStorage.setItem(`terr_world_${currentWorldName}`, JSON.stringify(worldData));
    console.log(`World "${currentWorldName}" saved successfully`);
    
    // Show success message
    const message = document.getElementById('adminMessage');
    if (message) {
      message.textContent = `World "${currentWorldName}" saved!`;
      setTimeout(() => {
        if (message.textContent.includes("saved")) {
          message.textContent = "";
        }
      }, 2000);
    }
  } catch (error) {
    console.error("Failed to save world:", error);
    const message = document.getElementById('adminMessage');
    if (message) {
      message.textContent = "Failed to save world!";
      setTimeout(() => {
        if (message.textContent.includes("Failed")) {
          message.textContent = "";
        }
      }, 2000);
    }
  }
}

// Load world data from localStorage
function loadWorld(worldName) {
  try {
    const savedData = localStorage.getItem(`terr_world_${worldName}`);
    if (!savedData) {
      throw new Error("No saved world found");
    }
    
    const worldData = JSON.parse(savedData);
    
    // Restore world data
    seed = worldData.seed;
    world = worldData.world;
    background = {}; // Reset background since it's not saved
    
    // Restore player position
    player.x = worldData.player.x;
    player.y = worldData.player.y;
    player.w = worldData.player.w || player.w;
    player.h = worldData.player.h || player.h;
    playerHealth = worldData.player.health;
    
    // Restore inventory
    inventory = new Inventory(); // Reset inventory
    worldData.inventory.forEach(item => {
      if (item.type) {
        inventory.setSlot(item.index, item.type, item.count);
      }
    });
    
    // Restore hotbar selection
    hotbarSelected = worldData.hotbarSelected || 0;
    
    currentWorldName = worldData.currentWorldName || worldName;
    
    // Update UI
    updateHotbar();
    updateInventoryDisplay();
    updateHealthBar();
    
    console.log(`World "${worldName}" loaded successfully`);
    
    // Show success message
    const message = document.getElementById('adminMessage');
    if (message) {
      message.textContent = `World "${worldName}" loaded!`;
      setTimeout(() => {
        if (message.textContent.includes("loaded")) {
          message.textContent = "";
        }
      }, 2000);
    }
    
    // Re-generate chunks around player to ensure everything is loaded
    ensureWorldGenerated(player.x, player.y);
    
  } catch (error) {
    console.error("Failed to load world:", error);
    const message = document.getElementById('adminMessage');
    if (message) {
      message.textContent = `Failed to load world "${worldName}"`;
      setTimeout(() => {
        if (message.textContent.includes("Failed")) {
          message.textContent = "";
        }
      }, 3000);
    }
  }
}

    function cave2D(x, y, biome, surfaceY) {
  if (y >= surfaceY) return false; // do not carve above surface

  const octaveCount = 4;
  const baseScale = 0.08; // controls cave size — smaller = bigger caves
  const thresholdBase = 0.55; // threshold to determine if cave occurs
  const depth = y - surfaceY;

  // Fractal 2D noise combining multiple frequencies
  let noiseValue = 0;
  let amplitude = 1;
  let frequency = baseScale;
  let maxAmplitude = 0;

  for (let i = 0; i < octaveCount; i++) {
    // 2D Perlin noise based on sum of x and y with seed offset by biome name length to diversify biomes
    noiseValue += perlin1d(x * frequency + y * frequency * 1.37 + 1000 * biome.name.length, 777 + i) * amplitude;
    maxAmplitude += amplitude;
    amplitude *= 0.5;
    frequency *= 2;
  }
  noiseValue /= maxAmplitude;

  // Make caves more common deeper underground
  const depthAdjustment = Math.min(0.2, -depth / 200);
  const threshold = thresholdBase - depthAdjustment;

  return noiseValue > threshold;
}

    // --- New Inventory System ---
class Inventory {
  constructor() {
    this.slots = [];
    this.maxSlots = 40;
    this.maxStackSize = 999;
    this.selectedSlot = 0;
    
    // Initialize with default items
    for (let i = 0; i < this.maxSlots; i++) {
      this.slots.push({ type: null, count: 0 });
    }
  }
  
  // Add items to inventory
  addItem(type, count = 1) {
    // Try to stack with existing items first
    for (let i = 0; i < this.slots.length; i++) {
      if (this.slots[i].type === type && this.slots[i].count < this.maxStackSize) {
        const space = this.maxStackSize - this.slots[i].count;
        const toAdd = Math.min(count, space);
        this.slots[i].count += toAdd;
        count -= toAdd;
        if (count <= 0) return true;
      }
    }
    
    // Add to new slots
    for (let i = 0; i < this.slots.length; i++) {
      if (this.slots[i].type === null) {
        const toAdd = Math.min(count, this.maxStackSize);
        this.slots[i].type = type;
        this.slots[i].count = toAdd;
        count -= toAdd;
        if (count <= 0) return true;
      }
    }
    
    return false; // Inventory full
  }
  
  // Remove items from inventory
  removeItem(type, count = 1) {
    for (let i = 0; i < this.slots.length; i++) {
      if (this.slots[i].type === type) {
        const toRemove = Math.min(count, this.slots[i].count);
        this.slots[i].count -= toRemove;
        if (this.slots[i].count <= 0) {
          this.slots[i].type = null;
        }
        count -= toRemove;
        if (count <= 0) return true;
      }
    }
    return false; // Not enough items
  }
  
  // Get item count
  getItemCount(type) {
    let count = 0;
    for (let i = 0; i < this.slots.length; i++) {
      if (this.slots[i].type === type) {
        count += this.slots[i].count;
      }
    }
    return count;
  }
  
  // Get slot at index
  getSlot(index) {
    return this.slots[index];
  }
  
  // Set slot at index
  setSlot(index, type, count) {
    this.slots[index].type = type;
    this.slots[index].count = count;
  }
  
  // Swap two slots
  swapSlots(fromIndex, toIndex) {
    if (fromIndex < 0 || fromIndex >= this.slots.length || 
        toIndex < 0 || toIndex >= this.slots.length) {
      return false;
    }
    
    const temp = this.slots[fromIndex];
    this.slots[fromIndex] = this.slots[toIndex];
    this.slots[toIndex] = temp;
    
    return true;
  }
  
  // Get selected slot
  getSelectedSlot() {
    return this.slots[this.selectedSlot];
  }
  
  // Set selected slot
  setSelectedSlot(index) {
    if (index >= 0 && index < this.slots.length) {
      this.selectedSlot = index;
    }
  }
  
  // Get all items for display
  getAllItems() {
    const items = [];
    for (let i = 0; i < this.slots.length; i++) {
      if (this.slots[i].type !== null) {
        items.push({ index: i, type: this.slots[i].type, count: this.slots[i].count });
      }
    }
    return items;
  }
}

      draggedSlot = slot;
      draggedFromIndex = i;
      draggedFromHotbarIndex = null;
      e.dataTransfer.effectAllowed = 'move';
      slot.classList.add('dragging');
    });
    
    slot.addEventListener('dragend', () => {
      slot.classList.remove('dragging');
      draggedSlot = null;
      draggedFromIndex = null;
      draggedFromHotbarIndex = null;
    });
    
    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      slot.classList.add('drag-over');
    });
    
    slot.addEventListener('dragenter', (e) => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });
    
    slot.addEventListener('dragleave', () => {
      slot.classList.remove('drag-over');
    });
    
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      
      // Dropped from another inventory slot -> swap
      if (draggedSlot && draggedFromIndex !== null && draggedFromIndex !== i) {
        const fromSlot = inventory.getSlot(draggedFromIndex);
        const toSlot = inventory.getSlot(i);

        inventory.setSlot(draggedFromIndex, toSlot.type, toSlot.count);
        inventory.setSlot(i, fromSlot.type, fromSlot.count);

        updateInventoryDisplay();
        updateHotbar();
        return;
      }

      // Dropped from a hotbar slot -> unpin that hotbar (safe, no item counts changed)
      if (draggedFromHotbarIndex !== null) {

        updateHotbar();
        return;

// helper color functions
function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex,16);
  return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
}
function rgbToCss(rgb){ return `rgb(${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)})`; }
function lerp(a,b,t){ return a + (b-a)*t; }
function lerpColorHex(a,b,t){
  const A = hexToRgb(a), B = hexToRgb(b);
  return rgbToCss({ r: lerp(A.r,B.r,t), g: lerp(A.g,B.g,t), b: lerp(A.b,B.b,t) });
}

// continuous color based on perlin sample (use same scale as getBiome)
function biomeBlendColor(x) {
  // sample same noise domain you use for getBiome
  const n = perlin1d(x / 64, betterseed * 13); // results 0..1
  // decide ranges (make continuous transitions between zones)
  // thresholds chosen to match your previous getBiome logic
  if (n < 0.25) return BIOME_BG_COLORS.desert;
  if (n < 0.48) {
    const t = (n - 0.25) / (0.48 - 0.25);
    return lerpColorHex(BIOME_BG_COLORS.desert, BIOME_BG_COLORS.snow, t);
  }
  if (n < 0.52) {
    const t = (n - 0.48) / (0.52 - 0.48);
    return lerpColorHex(BIOME_BG_COLORS.snow, BIOME_BG_COLORS.forest, t);
  }
  if (n < 0.72) {
    const t = (n - 0.52) / (0.72 - 0.52);
    return lerpColorHex(BIOME_BG_COLORS.forest, BIOME_BG_COLORS.jungle || BIOME_BG_COLORS.forest, t);
  }
  // else clay and beyond
  const t = Math.min(1, (n - 0.72) / 0.28);
  return lerpColorHex(BIOME_BG_COLORS.forest, BIOME_BG_COLORS.clay, t);
}

// Add this function to check if player is near an anvil
function isNearAnvil() {
  const anvilType = "anvil";
  const anvilBlocks = [];
  
  // Find all anvil blocks in the current view
  const left = Math.floor(camera.x - CAMERA_WIDTH/2);
  const top = Math.floor(camera.y - CAMERA_HEIGHT/2);
  const right = left + CAMERA_WIDTH + 2;
  const bottom = top + CAMERA_HEIGHT + 2;
  
  for(let x = left; x <= right; x++) {
    for(let y = top; y <= bottom; y++) {
      const block = getBlock(x, y);
      if(block === anvilType) {
        anvilBlocks.push({x, y});
      }
    }
  }
  
  // Check if any anvil is within 5 blocks of player
  for(const anvil of anvilBlocks) {
    const distance = Math.sqrt(
      Math.pow(player.x - anvil.x, 2) + 
      Math.pow(player.y - anvil.y, 2)
    );
    if(distance <= 5) {
      return true;
    }
  }
  
  return false;
}

function raycast(playerX, playerY, targetX, targetY, maxDistance) {
    const blocksInLine = [];

    // Player's center (adjust player.y to be center of player's height)
    const startX = playerX;
    const startY = playerY + player.h / 5;

    const dx = targetX - startX;
    const dy = targetY - startY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance === 0) return blocksInLine; // No line to cast

    // Normalize direction vector
    const stepX = dx / distance;
    const stepY = dy / distance;

    // Sample at a finer resolution than 1 block to ensure we don't skip thin blocks.
    const resolution = 0.1; // Sample every 0.1 world units
    const numSteps = Math.min(distance, maxDistance) / resolution;

    let currentWorldX = startX;
    let currentWorldY = startY;

    let lastBlockX = Math.floor(currentWorldX);
    let lastBlockY = Math.floor(currentWorldY);

    for (let i = 0; i < numSteps; i++) {
        currentWorldX += stepX * resolution;
        currentWorldY += stepY * resolution;

        const blockX = Math.floor(currentWorldX);
        const blockY = Math.floor(currentWorldY);

        // If we moved into a new block, add it to the list
        if (blockX !== lastBlockX || blockY !== lastBlockY) {
            // Check if this block is within the player's mining reach
            if (isInReach(blockX, blockY)) {
                const distToPlayer = Math.sqrt((blockX + 0.5 - playerX)**2 + (blockY + 0.5 - (playerY + player.h/2))**2);
                blocksInLine.push({ x: blockX, y: blockY, distanceToPlayer: distToPlayer });
            }
            lastBlockX = blockX;
            lastBlockY = blockY;
        }

        // Stop if we exceed maxDistance
        const currentDistance = Math.sqrt((currentWorldX - startX)**2 + (currentWorldY - startY)**2);
        if (currentDistance > maxDistance) break;
    }

    return blocksInLine;
}

    function collideAABB(px, py, vx, vy, w, h) {
      let nx = px, ny = py;
      let onGround = false;
      nx += vx;
      let minY = Math.floor(ny + 1e-8), maxY = Math.floor(ny + h - 1e-8);
      if(vx > 0) {
        let rx = nx + w/2 - 1e-8;
        let xBlock = Math.floor(rx);
        for(let y = minY; y <= maxY; y++) {
          if(isSolid(xBlock, y)) {
            nx = xBlock - w/2;
            break;
          }
        }
      } else if(vx < 0) {
        let lx = nx - w/2 + 1e-8;
        let xBlock = Math.floor(lx);
        for(let y = minY; y <= maxY; y++) {
          if(isSolid(xBlock, y)) {
            nx = xBlock + 1 + w/2 - 1e-8;
            break;
          }
        }
      }
      ny += vy;
      let minX = Math.floor(nx - w/2 + 1e-7), maxX = Math.floor(nx + w/2 - 1e-8);
      if(vy > 0) {
        let by = ny + h - 1e-7;
        let yBlock = Math.floor(by);
        for(let x = minX; x <= maxX; x++) {
          if(isSolid(x, yBlock)) {
            ny = yBlock - h;
            onGround = true;
            break;
          }
        }
      } else if(vy < 0) {
        let ty = ny + 1e-7;
        let yBlock = Math.floor(ty);
        for(let x = minX; x <= maxX; x++) {
          if(isSolid(x, yBlock)) {
            ny = yBlock + 1;
            break;
          }
        }
      }
      return {x: nx, y: ny, onGround};
    }

// bg colors
function drawBackgroundLayer() {
  const camX = camera.x - CAMERA_WIDTH / 2;
  const camY = camera.y - CAMERA_HEIGHT / 2;

  // Get biome and base background color
    // Get biome at player's x position
  const biome = getBiome(Math.floor(camera.x || player.x || 0));
  const currentBiomeName = biome.name;
  let baseColor = BIOME_BG_COLORS[biome.name] || BIOME_BG_COLORS.default;

  // Darkening factor based on player.y (darken as player goes below y=0 to y=-550)
  const yStart = 0;
  const yEnd = -550;
  let darkFactor = 0;
  if (player.y < yStart) {
    darkFactor = Math.min(1, (yStart - player.y) / (yStart - yEnd));
  }

  // Convert baseColor hex to RGB and darken it
  const baseRgb = hexToRgb(baseColor);
  const darkenedColor = darkenColor(baseRgb, darkFactor);

  // Clear and fill background color
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgCtx.fillStyle = darkenedColor;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Sort fadeImages by zIndex ascending
  fadeImages.sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));

  fadeImages.forEach(fade => {
    if (!fade.loaded) return;

    // BIOME CHECK: skip if biomes property exists and current biome is NOT included
    if (fade.biomes && !fade.biomes.includes(currentBiomeName)) {
      return; // skip drawing this fade image
    }
    const startY = Math.min(fade.fadeStartY, fade.fadeEndY);
    const endY = Math.max(fade.fadeStartY, fade.fadeEndY);

    // Compute fade alpha with reversed support
    let alpha = 0;
    if (!fade.fadeReversed) {
      if (player.y >= startY && player.y <= endY) {
        alpha = (player.y - startY) / (endY - startY);
      } else if (player.y > endY) {
        alpha = 1;
      } else {
        alpha = 0;
      }
    } else {
      if (player.y >= startY && player.y <= endY) {
        alpha = 1 - (player.y - startY) / (endY - startY);
      } else if (player.y < startY) {
        alpha = 1;
      } else {
        alpha = 0;
      }
    }

    if (alpha <= 0) return;

    bgCtx.save();
    bgCtx.globalAlpha = alpha;

    // Apply time-of-day darkening if enabled for this fade image
    if (fade.darkenByTimeOfDay) {
      const lightLevel = getAmbientLight();
      bgCtx.globalAlpha *= lightLevel;
    }

    const imgW = fade.img.width;
    const imgH = fade.img.height;

    if (imgW === 0 || imgH === 0) {
      bgCtx.restore();
      return; // avoid divide by zero or drawing empty images
    }

    // Base center position with offset
    const baseX = (bgCanvas.width / 2) - (imgW / 2) + (fade.offsetX || 0);
    const baseY = (bgCanvas.height / 2) - (imgH / 2) + (fade.offsetY || 0);

    // Parallax offset wrapped for looping
    let offsetX = 0;
    let offsetY = 0;

    if (fade.loopX) {
      offsetX = ((-camX * (fade.parallaxFactorX || 0)) % imgW);
      if (offsetX > 0) offsetX -= imgW;
    } else {
      offsetX = -camX * (fade.parallaxFactorX || 0);
    }

    if (fade.loopY) {
      offsetY = ((-camY * (fade.parallaxFactorY || 0)) % imgH);
      if (offsetY > 0) offsetY -= imgH;
    } else {
      offsetY = -camY * (fade.parallaxFactorY || 0);
    }

    // Rotation in radians based on horizontal camera movement
    const rotation = (fade.rotationFactor || 0) * camX;

    // Number of repetitions to cover canvas for looping
    const repeatX = fade.loopX ? Math.ceil(bgCanvas.width / imgW) + 2 : 1;
    const repeatY = fade.loopY ? Math.ceil(bgCanvas.height / imgH) + 2 : 1;

    // Calculate time-of-day darkening if enabled for this image
    let timeDarkening = 1;
    if (fade.darkenByTime) {
      const timeNormalized = getTimeOfDayNormalized(); // 0-1 value
      // Darken during night (from ~0.75 to ~0.25 of the day cycle)
      // Peak darkness at 0.0 (midnight), full brightness at 0.5 (noon)
      const nightFactor = Math.abs(timeNormalized - 0.5) * 2; // 0 at noon, 1 at midnight
      timeDarkening = 0.4 + (0.6 * nightFactor); // Range: 0.4 (night) to 1.0 (day)
    }

    for (let ix = 0; ix < repeatX; ix++) {
      for (let iy = 0; iy < repeatY; iy++) {
        // Calculate draw position of this tile
        const drawX = baseX + offsetX + ix * imgW;
        const drawY = baseY + offsetY + iy * imgH;

        // Draw with rotation at center of this tile
        bgCtx.save();

        // Translate to center of tile
        bgCtx.translate(drawX + imgW / 2, drawY + imgH / 2);
        bgCtx.rotate(rotation);

        // Apply time-of-day darkening filter if enabled
        if (fade.darkenByTime && timeDarkening < 1) {
          bgCtx.filter = `brightness(${timeDarkening * 100}%)`;
        }

        // Draw image centered at origin
        bgCtx.drawImage(fade.img, -imgW / 2, -imgH / 2, imgW, imgH);

        bgCtx.restore();
      }
    }

    bgCtx.restore();
  });
}

function hexToRgb(hex) {
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    const bigint = parseInt(hex, 16);
    return {
      r: (bigint >> 16) & 255,
      g: (bigint >> 8) & 255,
      b: bigint & 255
    };
  }





// Darken color by factor (0 = original color, 1 = full black)
  function darkenColor(rgb, factor) {
    return `rgb(${Math.floor(rgb.r * (1 - factor))}, ${Math.floor(rgb.g * (1 - factor))}, ${Math.floor(rgb.b * (1 - factor))})`;
  }

// Compute Manhattan distance-to-air but only across generated tiles.
// Ungenerated tiles (getBlock(...) === null) are ignored and never seeded or expanded into.
// left..right/top..bottom inclusive, maxDist caps distances.
function computeDistanceToAirGenerated(left, right, top, bottom, maxDist = 32) {
  const w = right - left + 1;
  const h = bottom - top + 1;
  const inf = maxDist + 1;
  const dist = new Int16Array(w * h);
  for (let i = 0; i < dist.length; i++) dist[i] = inf;

  function idx(x, y) { return (x - left) + (y - top) * w; }

  const qx = [];
  const qy = [];

  // Seed with tiles that are generated and explicitly air
  for (let x = left; x <= right; x++) {
    for (let y = top; y <= bottom; y++) {
      const b = getBlock(x, y);
      if (b === 'air') {
        const i = idx(x, y);
        dist[i] = 0;
        qx.push(x); qy.push(y);
      }
    }
  }

  // BFS, but only expand into tiles that are generated (getBlock !== null)
  let head = 0;
  while (head < qx.length) {
    const cx = qx[head], cy = qy[head]; head++;
    const ci = idx(cx, cy);
    const cd = dist[ci];
    if (cd >= maxDist) continue;

    const neigh = [[1,0],[-1,0],[0,1],[0,-1]];
    for (let n = 0; n < 4; n++) {
      const nx = cx + neigh[n][0], ny = cy + neigh[n][1];
      if (nx < left || nx > right || ny < top || ny > bottom) continue;
      // only expand into generated tiles
      const nb = getBlock(nx, ny);
      if (nb === null) continue;
      const ni = idx(nx, ny);
      if (dist[ni] > cd + 1) {
        dist[ni] = cd + 1;
        qx.push(nx); qy.push(ny);
      }
    }
  }

  return {
    get(x, y) {
      if (x < left || x > right || y < top || y > bottom) return inf;
      return dist[idx(x, y)];
    },
    width: w,
    height: h,
    left, right, top, bottom
  };
}

      // Walls block less light than solid blocks
      let head = 0;
      while (head < qx.length) {
        const cx = qx[head];
        const cy = qy[head];
        head++;

        if (cd >= maxDist) continue; // no need to expand past maxDist

        const neighbors = [
          [cx+1, cy],
          [cx-1, cy],
          [cx, cy+1],
          [cx, cy-1]

        for (let n = 0; n < 4; n++) {
          const nx = neighbors[n][0], ny = neighbors[n][1];
          if (nx < left || nx > right || ny < top || ny > bottom) continue;
          const ni = idx(nx, ny);
          
          // Determine if this is a wall or solid block

            } else if (fgBlock === 'torch') {

            } else {

            }

          const newDist = cd + cost;
          if (dist[ni] > newDist) {
            dist[ni] = Math.ceil(newDist); // Round up to keep integer distances
            qx.push(nx);
            qy.push(ny);
          }
        }
      }

      return {
        get(x, y) {
          if (x < left || x > right || y < top || y > bottom) return inf;
          return dist[idx(x,y)];

// IndexedDB Setup for world saves
const DB_NAME = 'TerrandiaDB';
const STORE_NAME = 'worldSaves';

function initIndexedDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

function saveWorldToIndexedDB(worldName) {
  return initIndexedDB().then(db => {
    const transaction = db.transaction(STORE_NAME, 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    
    const saveData = {
      name: worldName || currentWorldName || 'Unnamed World',
      timestamp: Date.now(),
      seed: seed,
      world: world,
      player: {
        x: player.x,
        y: player.y,
        w: player.w,
        h: player.h,
        health: playerHealth,
      },
      inventory: inventory.getAllItems(),
      hotbarSelected: hotbarSelected,
      currentWorldName: currentWorldName
    };
    console.log(`[SAVE] Saving "${saveData.name}" with ${Object.keys(world).length} blocks`);
    // Count block types
    let airCount = 0, solidCount = 0;
    for (let key in world) {
      if (world[key] === 'air') airCount++;
      else solidCount++;
    }
    console.log(`[SAVE] Breakdown: ${airCount} air, ${solidCount} solid`);
    
    // First check if a world with this name already exists
    const getAllRequest = store.getAll();
    return new Promise((resolve, reject) => {
      getAllRequest.onsuccess = () => {
        const worlds = getAllRequest.result;
        const existingWorld = worlds.find(w => w.name === saveData.name);
        
        if (existingWorld) {
          // Update existing world by keeping the same ID
          saveData.id = existingWorld.id;
          const putRequest = store.put(saveData);
          putRequest.onsuccess = () => resolve(putRequest.result);
          putRequest.onerror = () => reject(putRequest.error);
        } else {
          // Add new world
          const addRequest = store.add(saveData);
          addRequest.onsuccess = () => resolve(addRequest.result);
          addRequest.onerror = () => reject(addRequest.error);
        }
      };
      getAllRequest.onerror = () => reject(getAllRequest.error);
    });
  });
}

<script>

// Set up automatic hotbar updates every second



let originalAddItem = inventory.addItem;
inventory.addItem = function(type, count = 1) {
  // Track acquisition time
  if (!acquisitionTimes[type]) {
    acquisitionTimes[type] = Date.now();
  }
  
  // Call original function
  const result = originalAddItem.call(this, type, count);
  
  updateHotbar();
  return result;
};

let originalRemoveItem = inventory.removeItem;
inventory.removeItem = function(type, count = 1) {
  // Call original function
  const result = originalRemoveItem.call(this, type, count);
  
  // If item count is now 0, remove from acquisition times (optional)
  if (this.getItemCount(type) <= 0) {
    delete acquisitionTimes[type];
  }
  
  // Trigger hotbar update
  updateHotbar();
  return result;
};

(function wireWorldSelectStart() {
  const list = document.getElementById('worldSelectList');
  if (!list) return;

  // Double-click to load + start
  list.addEventListener('dblclick', async (e) => {
    const name = (selectedWorldName || '').trim();
    if (!name) return;

    try {
      await loadWorldFromIndexedDB(name);
      document.getElementById('worldSelectScreen').style.display = 'none';
      document.getElementById('start').style.display = 'none';
      gameRunning = true;
      resizeCanvas();
      loop();
    } catch (err) {
      console.error(err);
      showPopup?.(String(err.message || err), 'Load Error');
    }
  });
})();
